name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Smart Contract Tests ─────────────────────────────────────
  contracts:
    name: Foundry Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart_contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run forge tests
        run: forge test -vvv

  # ── Android APK Build ────────────────────────────────────────
  android:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Get APK path and info
        id: apk_info
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tranzo-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Send APK to Telegram
        if: github.event_name == 'push'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          APK_PATH="${{ steps.apk_info.outputs.apk_path }}"
          SHORT_SHA="${{ steps.apk_info.outputs.short_sha }}"
          APK_SIZE="${{ steps.apk_info.outputs.apk_size }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)

          CAPTION=$(cat <<EOF
          🚀 <b>Tranzo Build</b> <code>${SHORT_SHA}</code>
          📦 Size: ${APK_SIZE}
          🌿 Branch: ${BRANCH}
          👤 Author: ${AUTHOR}
          💬 ${COMMIT_MSG}
          EOF
          )

          curl -s -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@${APK_PATH}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=HTML"

  # ── Build Status Notification ────────────────────────────────
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [contracts, android]
    if: always() && github.event_name == 'push'
    steps:
      - name: Send build status to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          CONTRACTS="${{ needs.contracts.result }}"
          ANDROID="${{ needs.android.result }}"

          if [ "$CONTRACTS" = "success" ] && [ "$ANDROID" = "success" ]; then
            STATUS="✅ All checks passed"
          else
            STATUS="❌ Build failed"
          fi

          MESSAGE=$(cat <<EOF
          <b>${STATUS}</b> — <code>${SHORT_SHA}</code>

          🔗 Contracts: ${CONTRACTS}
          📱 Android: ${ANDROID}
          EOF
          )

          curl -s -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"
