name: Android Build & Deploy to Telegram

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle Wrapper ──────────────────────────────────────────
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.9

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Gradle Cache ────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ── Build Debug APK ─────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Get APK Info ────────────────────────────────────────────
      - name: Get APK path and info
        id: apk_info
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      # ── Upload APK Artifact ─────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tranzo-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      # ── Send APK to Telegram ────────────────────────────────────
      - name: Send APK to Telegram
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          APK_PATH="${{ steps.apk_info.outputs.apk_path }}"
          SHORT_SHA="${{ steps.apk_info.outputs.short_sha }}"
          APK_SIZE="${{ steps.apk_info.outputs.apk_size }}"
          
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          
          CAPTION="🚀 *Tranzo Build — \`${SHORT_SHA}\`*

📦 *APK Size:* ${APK_SIZE}
🌿 *Branch:* \`${BRANCH}\`
👤 *Author:* ${AUTHOR}
📝 *Commit:* ${COMMIT_MSG}

[View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"

          curl -s -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "document=@${APK_PATH}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown"
